  parent: [ OrganBaseLegRight, OrganMotorkindExternal ]

- type: entity
  id: OrganMotorkindHead
  parent: [ OrganBaseHead, OrganMotorkindExternal ]

- type: entity
  parent: [ OrganBaseBrain, OrganMotorkindInternal ]
  id: OrganMotorkindBrainEngine
  name: engine
  description: "A compact internal combustion engine that has been modified to serve as the central processing unit for a motorkind."
  components:
  - type: Sprite
    state: engine
    layers:
    - state: engine
      map: ["base"]

- type: entity
  parent: [ OrganBaseEyes, OrganMotorkindInternal, OrganMotorkindExternal ]
  id: OrganMotorkindEyes
  name: windshield
  description: "A single windshield that serves to protect the cabin of the Motorkind, as well as provide vision, somehow."
  components:
  - type: Sprite
    sprite: _DV/Mobs/Species/Motorkind/organs.rsi
    state: windshield
    layers:
    - state: windshield
  - type: VisualOrgan
    data:
      sprite: _DV/Mobs/Species/Motorkind/parts.rsi
      state: eyes

- type: entity
  parent: [ OrganMotorkindInternal ]
  id: OrganMotorkindStomachFuelTank
  name: fuel tank
  description: "A fuel tank that stores various fuels to power the motorkind's engine."
  components:
  - type: Sprite
    layers:
    - state: fuel_tank
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 5
  - type: GibbableOrgan
  - type: Organ
    category: Stomach
  - type: Stomach
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Fuel ]
  - type: Item
    size: Small
    heldPrefix: stomach

- type: entity
  parent: [ OrganBaseLiver, OrganMotorkindInternal ]
  id: OrganMotorkindLiverOilFilter
  name: oil filter
  description: "An oil filter that cleans the motorkind's oil to ensure smooth operation of its engine."
  components:
  - type: Sprite
    layers:
    - state: oil_filter

- type: entity
  parent: [ OrganBaseLungs, OrganMotorkindInternal ]
  id: OrganMotorkindLungsCatalyticConverter
  name: catalytic converter
  description: "Helps purify the output of a Motorkind's engine into something less toxic. Motorkind are often hunted for these valuable trophies."
  components:
  - type: Sprite
    layers:
    - state: catalytic_converter
  - type: GibbableOrgan
  - type: Organ
    category: Lungs
  - type: Lung
  - type: Item
    heldPrefix: lungs
  - type: Metabolizer
    metabolizerTypes: [ Fuel ]

- type: entity
