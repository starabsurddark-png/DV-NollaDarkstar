            state: eyes
      mask:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: mask
      jumpsuit:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
      back:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
      outerClothing:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
      gloves:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
      shoes:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
      ears:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
      id:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
            state: hide
  - type: Hands
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
          state: hand_l
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: _DV/Mobs/Species/Motorkind/displacement.rsi
          state: hand_r
  - type: InitialBody
    organs:
      Torso: OrganMotorkindTorso
      Head: OrganMotorkindHead
      ArmLeft: OrganMotorkindFrontLeft
      ArmRight: OrganMotorkindFrontRight
      HandRight: OrganMotorkindHandRight
      HandLeft: OrganMotorkindHandLeft
      LegLeft: OrganMotorkindBackLeft
      LegRight: OrganMotorkindBackRight
#      FootLeft: OrganHumanFootLeft
#      FootRight: OrganHumanFootRight
      Brain: OrganMotorkindBrainEngine
      Eyes: OrganMotorkindEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganMotorkindLungsCatalyticConverter
      Heart: OrganHumanHeart
      Stomach: OrganMotorkindStomachFuelTank
      Liver: OrganMotorkindLiverOilFilter
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Motorkind
  - type: ScaleVisuals
    speciesScale: 2, 2

- type: entity
  name: Urist McQueen
  parent:
  - AppearanceMotorkind
  - BaseSpeciesMobOrganic
  id: MobMotorkind
  components:
  - type: Barotrauma
  - type: PressureImmunity
  - type: Icon
    sprite: _DV/Mobs/Species/Motorkind/parts.rsi
    state: full
  - type: Damageable
    damageContainer: Silicon # Nubody - Deleted all HumanoidSilicon until we get a new IPC thing
    damageModifierSet: Motorkind
  - type: DamageVisuals
    thresholds: [25, 50, 75, 100]
    targetLayers:
    - "enum.HumanoidVisualLayers.Chest"
    damageOverlayGroups:
      Brute:
        sprite: _DV/Mobs/Species/Motorkind/brute_damage.rsi
        color: "#444444"
#   Delta V - Commented out until damageModifierSet with Burn is added
#      Burn:
#        sprite: _DV/Mobs/Species/Motorkind/burn_damage.rsi
#        color: "#888888"
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: SheetSteel10
      amount: 1
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Oil
        Quantity: 300
    bleedReductionAmount: 0.1
    maxBleedAmount: 10.75
    bloodlossDamage:
      types:
        Blunt: 0.05
    bloodlossHealDamage:
      types:
        Blunt: -0.025
  - type: Hunger
    baseDecayRate: 0.005
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - Honker
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
      Acidic: [Touch]
    reactions:
    - reagents: [Water, SpaceCleaner]
      methods: [Touch]
      effects:
      - !type:WashCreamPie
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45 # Annoyingly large
        density: 400 # It's a fucking Car
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MovementSpeedModifier
    baseWalkSpeed: 5
    baseSprintSpeed: 10
    baseAcceleration: 2 # Slow to start and stop
    acceleration: 2
    baseFriction: 0.25
    friction: 2
    frictionNoInput: 2
  - type: NoSlip
  - type: Respirator
    minSaturation: 1
    damage:
      types:
        Asphyxiation: 0.5
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: Vocal
    sounds:
      Male: MaleMotorkind
      Female: FemaleMotorkind
      Unsexed: MaleMotorkind
  - type: Speech
    speechSounds: Alto
  - type: EncryptionKeyHolder
    keySlots: 4
    keysExtractionMethod: Cutting
    keysUnlocked: false
  - type: Lock
    locked: true
    lockOnClick: false
    unlockOnClick: false
    lockTime: 5
    unlockTime: 5
    breakOnAccessBreaker: false
  - type: ActiveRadio
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
  - type: Strap
    position: Down
    rotation: -90
  - type: Buckle
    size: 120 # Slightly too large for other cars / seats.
  - type: TrafficHazard
    minimumSpeed: 5
    minimumSpeedDifference: 7
    stunTime: 0 # Don't stun, just collide.
    collisionDamage:
      types:
        Blunt: 10

- type: entity
