  id: OrganMotorkindFrontRight
  name: "front-right wheel"
  description: "Motorkind wheels are unfortunately not universal, this was done intentionally for capitalism reasons."

- type: entity
  id: OrganMotorkindBackLeft
  name: "back-left wheel"
  description: "Motorkind wheels are unfortunately not universal, this was done intentionally for capitalism reasons."
  parent: [ OrganBaseLegLeft, OrganMotorkindExternal ]

- type: entity
  id: OrganMotorkindBackRight
  name: "back-right wheel"
